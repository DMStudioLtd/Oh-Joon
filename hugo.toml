baseURL = "https://dmstudioltd.github.io/Oh-Joon/"
title = "Oh-JOON Lab"
theme = "paper"
paginate = 20

[params]
  color = "light"
  github = "DMStudioLtd/Oh-Joon"
  subtitle = "권오준 · 기술 리서치 블로그"
  mainSections = ["posts"]

[params.comments]
  enabled = false

[markup]
  [markup.highlight]
    style = "monokailight"
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
