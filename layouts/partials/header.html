<header
  class="mx-auto flex h-[4.5rem] max-w-(--w) px-8 whitespace-nowrap lg:justify-center"
  style="border-bottom: 1px solid #D8DDE8;"
>
  <div class="relative z-50 flex items-center ltr:mr-auto rtl:ml-auto">
    <a
      class="-translate-y-[1px] text-2xl font-medium"
      style="font-family:'Noto Serif KR',Georgia,serif; font-weight:900; letter-spacing:-.02em;"
      href="{{- `` | absURL -}}{{- .Language.Lang -}}/"
      >{{ site.Title }}</a
    >
  </div>

  <div
    class="btn-menu relative z-50 flex h-[4.5rem] w-[5rem] shrink-0 cursor-pointer flex-col items-center justify-center gap-2.5 lg:hidden ltr:-mr-8 rtl:-ml-8"
    role="button"
    aria-label="Menu"
  ></div>

  <script>
    const htmlClass = document.documentElement.classList;
    setTimeout(() => { htmlClass.remove('not-ready'); }, 10);
    htmlClass.remove('dark');
    localStorage.setItem('dark', false);

    const metaTheme = document.querySelector('meta[name="theme-color"]');
    metaTheme.setAttribute('content', '#fff');

    const btnMenu = document.querySelector('.btn-menu');
    btnMenu.addEventListener('click', () => { htmlClass.toggle('open'); });
  </script>

  <div
    class="nav-wrapper fixed inset-x-0 top-full z-40 flex h-full flex-col justify-center bg-(--bg) pb-16 duration-200 select-none lg:static lg:h-auto lg:flex-row lg:bg-transparent! lg:pb-0 lg:transition-none"
  >
    <!-- Language Switcher -->
    <nav
      class="mt-12 flex justify-center space-x-6 lg:mt-0 lg:items-center ltr:lg:ml-14 rtl:lg:mr-14"
      style="font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:.05em;"
    >
      {{- $currentLang := .Language.Lang -}}
      {{- range hugo.Sites -}}
      {{- $sLang := .Language.Lang -}}
      {{- if eq $sLang $currentLang -}}
      <span style="color:#0A1628; font-weight:700; border-bottom:2px solid #0A1628; padding-bottom:2px;">
        {{- if eq $sLang "ko" -}}KR{{- else -}}EN{{- end -}}
      </span>
      {{- else -}}
      <a
        style="color:#7A8698; text-decoration:none; padding-bottom:2px;"
        href="{{- `/` | absURL -}}{{- $sLang -}}/"
      >
        {{- if eq $sLang "ko" -}}KR{{- else -}}EN{{- end -}}
      </a>
      {{- end -}}
      {{- end -}}
    </nav>
  </div>
</header>
